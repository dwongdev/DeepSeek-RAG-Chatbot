<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cortex RAG banner">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0b12"/>
      <stop offset="0.5" stop-color="#0d1020"/>
      <stop offset="1" stop-color="#090a14"/>
    </linearGradient>
    <linearGradient id="cx-grad" x1="60" y1="60" x2="260" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b7bff"/>
      <stop offset="0.55" stop-color="#6ea8ff"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="word-grad" x1="330" y1="120" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#c4b8ff"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b7bff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8b7bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cx-core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c4b8ff"/>
      <stop offset="0.5" stop-color="#8b7bff"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </radialGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.3" cy="1.3" r="1.3" fill="#1c2140"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="340" rx="20" fill="url(#bg-grad)"/>
  <rect width="1200" height="340" rx="20" fill="url(#dots)" opacity="0.6"/>
  <rect x="1" y="1" width="1198" height="338" rx="19" fill="none" stroke="#23264a" stroke-width="1.4"/>
  <ellipse cx="190" cy="170" rx="260" ry="220" fill="url(#halo)"/>

  <!-- ===== LOGO MARK (left) translated to 90,70 scale 1.0 ===== -->
  <g transform="translate(70,70)">
    <circle cx="100" cy="100" r="78" stroke="url(#cx-grad)" stroke-width="1.4" opacity="0.25"/>
    <g stroke="url(#cx-grad)" stroke-width="2" opacity="0.45" stroke-linecap="round">
      <path d="M96 100 L79.5 44"/><path d="M96 100 L40 100"/><path d="M96 100 L79.5 156"/>
      <path d="M96 100 L115.5 42"/><path d="M96 100 L115.5 158"/><path d="M96 100 L51 66"/><path d="M96 100 L51 134"/>
    </g>
    <path d="M146 61 L115.5 42 L79.5 44 L51 66 L40 100 L51 134 L79.5 156 L115.5 158 L146 139"
          stroke="url(#cx-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#g)"/>
    <circle cx="68" cy="100" r="2.6" fill="#2dd4bf"/><circle cx="88" cy="72" r="2.6" fill="#ffb347"/><circle cx="88" cy="128" r="2.6" fill="#8b7bff"/>
    <g fill="#0a0b12" stroke="url(#cx-grad)" stroke-width="3">
      <circle cx="146" cy="61" r="7"/><circle cx="115.5" cy="42" r="7"/><circle cx="79.5" cy="44" r="7"/>
      <circle cx="51" cy="66" r="7"/><circle cx="40" cy="100" r="7"/><circle cx="51" cy="134" r="7"/>
      <circle cx="79.5" cy="156" r="7"/><circle cx="115.5" cy="158" r="7"/><circle cx="146" cy="139" r="7"/>
    </g>
    <circle cx="96" cy="100" r="13" fill="url(#cx-core)" filter="url(#g)"/>
    <circle cx="96" cy="100" r="5" fill="#0a0b12" opacity="0.85"/>
    <circle cx="96" cy="100" r="2.4" fill="#c4b8ff"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text x="320" y="150" font-family="'Bricolage Grotesque','Segoe UI',Arial,sans-serif" font-size="80" font-weight="800" letter-spacing="-1" fill="url(#word-grad)">CORTEX<tspan fill="#2dd4bf"> RAG</tspan></text>
  <text x="324" y="192" font-family="'JetBrains Mono','Consolas',monospace" font-size="20" font-weight="600" letter-spacing="6" fill="#8b7bff">AGENTIC RETRIEVAL ENGINE · 2026</text>
  <text x="324" y="224" font-family="'Manrope','Segoe UI',Arial,sans-serif" font-size="19" fill="#7a80a6">RAG that thinks before it answers.</text>

  <!-- ===== TECHNIQUE CHIPS ===== -->
  <g font-family="'JetBrains Mono','Consolas',monospace" font-size="14" font-weight="600">
    <g transform="translate(324,250)">
      <rect width="118" height="30" rx="15" fill="#13162c" stroke="#3a3f6e" stroke-width="1"/>
      <text x="16" y="20" fill="#a9b0e0">Contextual</text>
    </g>
    <g transform="translate(452,250)">
      <rect width="118" height="30" rx="15" fill="#13162c" stroke="#3a3f6e" stroke-width="1"/>
      <text x="16" y="20" fill="#a9b0e0">RAG-Fusion</text>
    </g>
    <g transform="translate(580,250)">
      <rect width="106" height="30" rx="15" fill="#13162c" stroke="#3a3f6e" stroke-width="1"/>
      <text x="16" y="20" fill="#a9b0e0">GraphRAG</text>
    </g>
    <g transform="translate(696,250)">
      <rect width="74" height="30" rx="15" fill="#13162c" stroke="#3a3f6e" stroke-width="1"/>
      <text x="16" y="20" fill="#a9b0e0">CRAG</text>
    </g>
    <g transform="translate(780,250)">
      <rect width="104" height="30" rx="15" fill="#13162c" stroke="#3a3f6e" stroke-width="1"/>
      <text x="16" y="20" fill="#a9b0e0">Reasoning</text>
    </g>
    <g transform="translate(894,250)">
      <rect width="86" height="30" rx="15" fill="#13162c" stroke="#3a3f6e" stroke-width="1"/>
      <text x="14" y="20" fill="#a9b0e0">+ Cache</text>
    </g>
  </g>

  <!-- privacy badge -->
  <g transform="translate(1000,40)">
    <rect width="150" height="32" rx="16" fill="#0d2e1a" stroke="#1f6f4a" stroke-width="1"/>
    <circle cx="22" cy="16" r="4" fill="#2dd4bf"/>
    <text x="36" y="21" font-family="'JetBrains Mono','Consolas',monospace" font-size="13" font-weight="600" fill="#2dd4bf">100% LOCAL</text>
  </g>
</svg>
